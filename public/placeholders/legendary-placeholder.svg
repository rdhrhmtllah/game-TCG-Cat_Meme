<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" width="250" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.4"/>
      <stop offset="25%" stop-color="#FCD34D" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.4"/>
      <stop offset="75%" stop-color="#FCD34D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="250" height="350" rx="12" fill="url(#bg)"/>
  <rect width="250" height="350" rx="12" fill="url(#foil)"/>
  <rect x="8" y="8" width="234" height="334" rx="8" fill="none" stroke="#FBBF24" stroke-width="3"/>
  <text x="125" y="150" text-anchor="middle" font-size="64">👑</text>
  <text x="125" y="200" text-anchor="middle" font-size="18" fill="#FBBF24" font-family="sans-serif" font-weight="bold">LEGENDARY</text>
  <text x="125" y="230" text-anchor="middle" font-size="12" fill="#FCD34D" font-family="sans-serif">MemeCats</text>
  <!-- Sparkle accents -->
  <text x="40" y="80" font-size="20" fill="#FBBF24" opacity="0.8">✦</text>
  <text x="200" y="300" font-size="20" fill="#FBBF24" opacity="0.8">✦</text>
  <text x="190" y="70" font-size="14" fill="#FCD34D" opacity="0.5">✦</text>
  <text x="50" y="310" font-size="14" fill="#FCD34D" opacity="0.5">✦</text>
</svg>
